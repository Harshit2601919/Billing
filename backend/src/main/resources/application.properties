# Server Config
server.port=${PORT:8081}

# Spring Datasource (PostgreSQL)
# These will be provided by your Cloud Provider (Render/Railway)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/billing_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sonu@.321}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Config
# In Production, provide a long random string for JWT_SECRET
jwt.secret=${JWT_SECRET:BillFlowSuperSecretKeyForJWTAuthentication2026XYZ!@#}
jwt.expiration=2592000000

# Firebase Config (Optional for mobile)
firebase.service-account-path=${FIREBASE_CONFIG_PATH:classpath:service-account.json}
firebase.config-json=${FIREBASE_CONFIG_JSON:}
