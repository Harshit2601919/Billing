# Server Config
server.port=${PORT:8081}

# Spring Datasource (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/billing_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings for Supabase Transaction Pooler
spring.datasource.hikari.cachePrepStmts=false
spring.datasource.hikari.prepStmtCacheSize=0
spring.datasource.hikari.prepStmtCacheSqlLimit=0

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# JWT Config
jwt.secret=${JWT_SECRET:BillFlowSuperSecretKeyForJWTAuthentication2026XYZ!@#}
jwt.expiration=2592000000

# Firebase Config
firebase.config-json=${FIREBASE_CONFIG_JSON:}
