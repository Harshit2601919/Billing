<script src="js/api.js"></script>
<script>
    // Sidebar Toggle Function
    function toggleSidebar() {
        const sidebar = document.getElementById('main-sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        const isOpen = !sidebar.classList.contains('-translate-x-full');
        
        if (isOpen) {
            sidebar.classList.add('-translate-x-full');
            overlay.classList.add('hidden');
            document.body.style.overflow = '';
        } else {
            sidebar.classList.remove('-translate-x-full');
            overlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }
    }

    // Guard: Redirect if not logged in
    if (typeof requireAuth === 'function' && !requireAuth()) {
        throw new Error('Not authenticated - redirecting');
    }

    const modal = document.querySelector('.fixed.inset-0.z-50');
    const addPartnerBtn = document.querySelector('.add-partner-trigger');
    const closeBtn = modal.querySelector('button');
    const cancelBtn = modal.querySelector('button[type="button"]');
    const partnerForm = modal.querySelector('form');
    const grid = document.getElementById('partner-grid');
    const searchInputs = [document.getElementById('partner-search-header')];

    const modalTitle = modal.querySelector('.modal-title');
    let allPartners = [];
    let currentEditId = null;

    // Modal Control
    modal.classList.add('hidden');
    addPartnerBtn.onclick = () => {
        currentEditId = null;
        modalTitle.textContent = 'Add New Partner';
        partnerForm.reset();
        modal.classList.remove('hidden');
    };
    closeBtn.onclick = () => modal.classList.add('hidden');
    cancelBtn.onclick = () => modal.classList.add('hidden');

    async function loadPartners() {
        try {
            allPartners = await apiFetch('/customers/');
            renderPartners(allPartners);
        } catch (error) {
            console.error('Failed to load partners:', error);
        }
    }

    function editPartner(id) {
        const partner = allPartners.find(p => p.id === id);
        if (!partner) return;

        currentEditId = id;
        modalTitle.textContent = 'Edit Partner';
        
        const inputs = partnerForm.querySelectorAll('input');
        inputs[0].value = partner.name;
        inputs[1].value = partner.businessName || '';
        inputs[2].value = partner.location || '';
        inputs[3].value = partner.phoneNumber || '';
        
        modal.classList.remove('hidden');
    }

    function renderPartners(partners) {
        grid.innerHTML = '';
        if (partners.length === 0) {
            grid.innerHTML = `
                <div class="col-span-full py-20 text-center">
                    <div class="w-20 h-20 bg-surface-container-low rounded-full flex items-center justify-center mx-auto mb-4 border border-outline-variant/10">
                        <span class="material-symbols-outlined text-4xl text-on-surface-variant/30">search_off</span>
                    </div>
                    <h3 class="text-on-surface-variant font-medium">No customers found matching your search.</h3>
                </div>
            `;
            return;
        }
        partners.forEach(partner => {
            const card = document.createElement('div');
            card.className = 'bg-surface-container-highest p-6 rounded-xl hover:shadow-[0_15px_35px_rgba(108,92,231,0.2)] hover:-translate-y-1 transition-all duration-300 relative group border border-outline-variant/5 cursor-pointer';
            
            // Redirect on card click (not buttons)
            card.onclick = (e) => {
                if (!e.target.closest('button')) {
                    window.location.href = `06-bills-list.html?partnerName=${encodeURIComponent(partner.name)}`;
                }
            };

            const initials = partner.name.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);
            
            card.innerHTML = `
                <div class="flex flex-col items-center text-center">
                    <div class="w-16 h-16 rounded-full luminous-gradient flex items-center justify-center text-xl font-black text-white shadow-lg mb-4">
                        ${initials}
                    </div>
                    <h3 class="text-white font-bold text-lg">${partner.name}</h3>
                    <p class="text-on-surface-variant text-sm mb-4">${partner.businessName || 'Partner'}</p>
                    <div class="space-y-2 w-full text-left bg-surface-dim/50 p-4 rounded-xl mb-6">
                        <div class="flex items-center text-xs text-on-surface-variant">
                            <span class="material-symbols-outlined text-[14px] mr-2 text-[#00D2FF]">location_on</span>
                            ${partner.location || 'Location Not Set'}
                        </div>
                        <div class="flex items-center text-xs text-on-surface-variant mt-2">
                            <span class="material-symbols-outlined text-[14px] mr-2 text-[#00D2FF]">call</span>
                            ${partner.phoneNumber || 'No Phone'}
                        </div>
                    </div>
                    <div class="flex w-full gap-3">
                        <button class="flex-1 flex items-center justify-center py-2.5 px-4 bg-surface-container-high rounded-lg text-xs font-semibold text-primary-fixed-dim hover:bg-primary/10 transition-colors border border-primary/20 edit-btn">
                            <span class="material-symbols-outlined text-sm mr-2">edit</span> Edit
                        </button>
                        <button class="flex-1 flex items-center justify-center py-2.5 px-4 bg-surface-container-high rounded-lg text-xs font-semibold text-error/80 hover:bg-error/10 transition-colors border border-error/20 delete-btn">
                            <span class="material-symbols-outlined text-sm mr-2">delete</span> Delete
                        </button>
                    </div>
                </div>
            `;
            
            card.querySelector('.edit-btn').onclick = () => editPartner(partner.id);
            card.querySelector('.delete-btn').onclick = async () => {
                if(confirm('Are you sure you want to delete this customer?')) {
                    try {
                        await apiFetch(`/customers/${partner.id}`, { method: 'DELETE' });
                        loadPartners();
                    } catch (err) {
                        alert('Failed to delete: ' + err.message);
                    }
                }
            };
            
            grid.appendChild(card);
        });
    }

    // Search Logic
    searchInputs.forEach(input => {
        if(input) {
            input.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                const filtered = allPartners.filter(p => {
                    const name = (p.name || '').toLowerCase();
                    const loc = (p.location || '').toLowerCase();
                    const bus = (p.businessName || '').toLowerCase();
                    return name.includes(term) || loc.includes(term) || bus.includes(term);
                });
                renderPartners(filtered);
            });
        }
    });

    partnerForm.onsubmit = async (e) => {
        e.preventDefault();
        const inputs = partnerForm.querySelectorAll('input');
        const data = {
            name: inputs[0].value,
            businessName: inputs[1].value,
            location: inputs[2].value,
            phoneNumber: inputs[3].value
        };

        if (!data.name) return alert('Name is required');

        try {
            const url = currentEditId ? `/customers/${currentEditId}` : '/customers/';
            const method = currentEditId ? 'PUT' : 'POST';
            
            await apiFetch(url, {
                method: method,
                body: JSON.stringify(data)
            });
            
            modal.classList.add('hidden');
            partnerForm.reset();
            loadPartners();
        } catch (error) {
            alert('Failed to save partner: ' + error.message);
        }
    };

    // Logout
    document.querySelector('.logout-btn').onclick = (e) => {
        e.preventDefault();
        if(confirm('Are you sure you want to logout?')) handleLogout();
    };

    document.addEventListener('DOMContentLoaded', () => {
        loadPartners();
    });
</script>
